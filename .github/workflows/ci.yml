name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PORT: 3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          node server.js > server.log 2>&1 &
          sleep 5

      - name: Show logs
        run: cat server.log

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -fsS http://localhost:3001 && exit 0
            echo "Waiting for server..."
            sleep 2
          done
          echo "Server failed"
          cat server.log
          exit 1